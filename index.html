        .hover\:text-gold:hover { color: #f5b042; }
        
        .card {
            background: #12173f;

            transition: all 0.3s;
            border: 1px solid #1e2556;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.3); border-color: #f5b04230; }

            transition: all 0.2s;

            border-radius: 0.75rem;
        }
        .sidebar-link:hover { background: rgba(245, 176, 66, 0.15); transform: translateX(4px); color: #f5b042; }

        .btn-gold:hover { transform: scale(1.02); opacity: 0.95; }
        
        .gradient-gold { background: linear-gradient(135deg, #f5b042 0%, #e09d2c 100%); }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }

        /* Scrollbar Stili */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e2556; border-radius: 10px; }

        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 0 }).format(amount);
        }
        
        function calculateNetWorth() {
            let totalInvestments = investments.reduce((sum, inv) => sum + inv.value, 0);
            let totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            let totalExpenses = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            return totalInvestments + (totalIncome - totalExpenses);
        }
        
        function getFinancialHealthScore() {
            let monthlyIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            let monthlyExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            let savingsRate = (monthlyIncome - monthlyExpense) / monthlyIncome;
            let score = Math.min(100, Math.max(0, Math.floor(savingsRate * 100 + investments.length * 5)));
            return { score, grade: score > 80 ? 'Mükemmel' : score > 60 ? 'İyi' : score > 40 ? 'Orta' : 'Geliştirilmeli' };
        }
        
        function getAIRecommendation() {
            return "📊 Altın Portföyünüzü çeşitlendirin. Uzun vadeli hedefleriniz için düzenli yatırım stratejisi uygulayın.";
        }

        function handleLogin(email, password) {
            let user = users.find(u => u.email === email && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('finsage_user', JSON.stringify(user));
                renderApp();
                return true;
            }
            return false;
        }
        
        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('finsage_user');
            renderApp();
        }

        // ============================================

                                <p class="text-gray-400 text-sm flex items-center gap-2 mb-2"><i class="fas fa-envelope text-gold"></i> orhanboyraz0216@gmail.com</p>

        // ============================================

        function renderAuth() {

        function renderSidebar() {

        function renderDashboard() {
            let netWorth = calculateNetWorth();
            let health = getFinancialHealthScore();
            let monthlyIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            let monthlyExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            let savings = monthlyIncome - monthlyExpense;
            
            setTimeout(() => {
                let ctx = document.getElementById('trendChart')?.getContext('2d');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'line',
                        data: { labels: ['Oca', 'Şub', 'Mar', 'Nis', 'May'], datasets: [{ label: 'Portföy Değeri (₺)', data: [2850000, 2980000, 3120000, 3250000, 3420000], borderColor: '#f5b042', backgroundColor: 'rgba(245,176,66,0.1)', tension: 0.4, fill: true }] },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#f5b042' } } } }
                    });
                }
            }, 100);
            
            return `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="card p-6"><p class="text-gray-500 text-sm">Toplam Net Varlık</p><h2 class="text-3xl font-bold text-gold mt-2">${formatMoney(netWorth)}</h2><p class="text-emerald-500 text-sm mt-1"><i class="fas fa-arrow-up"></i> +%12.4</p></div>

                    <div class="card p-6"><p class="text-gray-500 text-sm">Finansal Sağlık Skoru</p><div class="flex justify-between items-center mt-2"><div><h2 class="text-4xl font-bold text-gold">${health.score}</h2><p class="text-emerald-500 text-sm">${health.grade}</p></div><div class="w-20 h-20 rounded-full border-4 border-gold/50 flex items-center justify-center"><span class="text-2xl font-bold text-gold">${health.score}</span></div></div></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                    <div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Portföy Performansı</h3><canvas id="trendChart" height="200"></canvas></div>
                    <div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Yapay Zeka Analizi</h3><div class="bg-gold-light p-4 rounded-xl mb-4"><p class="text-gold"><i class="fas fa-robot mr-2"></i>${getAIRecommendation()}</p></div><div class="space-y-3"><div class="flex justify-between p-3 bg-gold-light rounded-xl"><span class="text-gray-300">Aylık Yatırım Hedefi</span><span class="text-gold font-semibold">${formatMoney(25000)}</span></div><div class="flex justify-between p-3 bg-gold-light rounded-xl"><span class="text-gray-300">Acil Durum Fonu</span><span class="text-gold font-semibold">${formatMoney(180000)}</span></div></div></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="card p-6 text-center"><i class="fas fa-chart-simple text-3xl text-gold mb-3"></i><h3 class="font-semibold text-white">Yatırım Getirisi</h3><p class="text-2xl font-bold text-gold">+%24.7</p></div>
                    <div class="card p-6 text-center"><i class="fas fa-fire text-3xl text-gold mb-3"></i><h3 class="font-semibold text-white">FIRE İlerleme</h3><p class="text-2xl font-bold text-gold">%21.7</p></div>
                    <div class="card p-6 text-center"><i class="fas fa-shield-alt text-3xl text-gold mb-3"></i><h3 class="font-semibold text-white">Risk Skoru</h3><p class="text-2xl font-bold text-emerald-500">Düşük-Orta</p></div>
                </div>
            `;
        }
        
        function renderInvestments() {
            let totalValue = investments.reduce((s, i) => s + i.value, 0);
            setTimeout(() => {
                let ctx = document.getElementById('allocationChart')?.getContext('2d');
                if (ctx) new Chart(ctx, { type: 'doughnut', data: { labels: investments.map(i => i.name), datasets: [{ data: investments.map(i => i.value), backgroundColor: ['#f5b042', '#e09d2c', '#d48a1f', '#c27818'] }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#f5b042' } } } } });
            }, 100);
            return `<div class="card p-6 mb-6"><div class="flex justify-between items-start flex-wrap"><div><p class="text-gray-500">Toplam Yatırım Portföyü</p><h2 class="text-4xl font-bold text-gold">${formatMoney(totalValue)}</h2><p class="text-emerald-500 mt-2"><i class="fas fa-arrow-up"></i> +%18.2 Yıllık</p></div><div class="bg-gold-light px-4 py-2 rounded-full"><span class="text-gold font-semibold">Düşük Risk</span></div></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Varlıklarım</h3>${investments.map(inv => `<div class="flex justify-between items-center py-3 border-b border-[#1e2556]"><div><p class="font-medium text-white">${inv.name}</p><p class="text-sm text-gray-500">${inv.symbol}</p></div><div class="text-right"><p class="font-medium text-gold">${formatMoney(inv.value)}</p><p class="text-sm text-emerald-500">+${inv.change}%</p></div></div>`).join('')}</div><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Varlık Dağılımı</h3><canvas id="allocationChart" height="250"></canvas><div class="mt-4 p-3 bg-gold-light rounded-xl"><p class="text-sm text-gold"><i class="fas fa-robot mr-1"></i> Yapay Zeka Önerisi: Portföyünüzü dengede tutmak için 3 ayda bir yeniden değerlendirin.</p></div></div></div>`;
        }
        
        function renderFire() {

        }
        
        function renderDigitalMarket() {
            return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">${marketplaceProducts.map(p => `<div class="card p-6 text-center"><div class="text-5xl mb-3">${p.image}</div><h3 class="font-bold text-gold text-lg">${p.name}</h3><p class="text-gray-500 text-sm">${p.type === 'course' ? '📺 Eğitim' : p.type === 'ebook' ? '📖 E-Kitap' : '🎯 Danışmanlık'} • ${p.rating}⭐ (${p.sales} satış)</p><p class="text-gray-400 text-xs mt-1">${p.author}</p><p class="text-2xl font-bold text-gold mt-3">${formatMoney(p.price)}</p><button class="mt-4 w-full py-2 bg-gold text-[#0a0f2c] rounded-lg font-semibold hover:bg-amber-500 transition">Satın Al</button></div>`).join('')}</div><div class="card p-6 text-center"><i class="fas fa-chalkboard-user text-4xl text-gold mb-3"></i><h3 class="font-bold text-white text-xl">Özel Danışmanlık Hizmeti</h3><p class="text-gray-400 mt-2">CFO. Orhan BOYRAZ ile 1-1 özel finansal danışmanlık</p><button class="mt-4 px-6 py-2 btn-gold rounded-lg">Randevu Al →</button></div>`;
        }
        
        function renderAdvisory() {
            return `<div class="card p-6 mb-6"><h3 class="font-semibold text-gold text-lg mb-4">Danışmanlık Hizmetleri</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="p-4 bg-gold-light rounded-xl text-center"><i class="fas fa-user-tie text-3xl text-gold mb-2"></i><p class="font-semibold text-white">Bireysel Danışmanlık</p><p class="text-gold text-sm">499₺/saat</p><button class="mt-2 text-gold text-sm">Randevu Al →</button></div><div class="p-4 bg-gold-light rounded-xl text-center"><i class="fas fa-chart-line text-3xl text-gold mb-2"></i><p class="font-semibold text-white">Portföy Yönetimi</p><p class="text-gold text-sm">3.999₺/ay</p><button class="mt-2 text-gold text-sm">Başvur →</button></div><div class="p-4 bg-gold-light rounded-xl text-center"><i class="fas fa-fire text-3xl text-gold mb-2"></i><p class="font-semibold text-white">FIRE Planlaması</p><p class="text-gold text-sm">1.499₺</p><button class="mt-2 text-gold text-sm">Detaylar →</button></div></div></div><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Yapay Zeka Finansal Asistan</h3><div id="chatMessages" class="h-64 overflow-y-auto mb-4 p-3 bg-[#0f1338] rounded-xl border border-[#1e2556]"><div class="mb-3"><div class="bg-gold-light rounded-lg p-3 inline-block"><p class="text-sm text-gold">🤖 Merhaba! Ben FinSage AI asistanınız. Size nasıl yardımcı olabilirim?</p></div></div></div><div class="flex gap-2"><input type="text" id="chatInput" placeholder="Sorunuzu yazın..." class="flex-1 px-4 py-2 rounded-xl focus:ring-2 focus:ring-gold"><button id="sendChat" class="px-4 py-2 bg-gold text-[#0a0f2c] rounded-xl font-semibold"><i class="fas fa-paper-plane"></i> Gönder</button></div></div>`;
        }
        
        function renderPricing() {
            return `<div class="grid grid-cols-1 md:grid-cols-3 gap-6"><div class="card p-8 text-center"><h3 class="text-2xl font-bold text-gold">Basic</h3><p class="text-4xl font-bold text-white mt-4">₺0<span class="text-base font-normal text-gray-400">/ay</span></p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-gold mr-2"></i>Yönetim Paneli</li><li><i class="fas fa-check text-gold mr-2"></i>Temel Takip</li><li><i class="fas fa-times text-gray-500 mr-2"></i>Yapay Zeka Analizi</li></ul><button class="mt-8 w-full py-2 border-2 border-gold text-gold rounded-lg font-semibold hover:bg-gold hover:text-[#0a0f2c] transition">Mevcut Plan</button></div><div class="card p-8 text-center border-2 border-gold relative"><div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-gold text-[#0a0f2c] px-3 py-1 rounded-full text-xs font-bold">Popüler</div><h3 class="text-2xl font-bold text-gold">Pro</h3><p class="text-4xl font-bold text-white mt-4">₺299<span class="text-base font-normal text-gray-400">/ay</span></p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-gold mr-2"></i>Tüm Basic</li><li><i class="fas fa-check text-gold mr-2"></i>Yatırım Analizi</li><li><i class="fas fa-check text-gold mr-2"></i>Yapay Zeka Önerileri</li></ul><button class="mt-8 w-full py-2 bg-gold text-[#0a0f2c] rounded-lg font-semibold hover:bg-amber-500 transition">Yükselt</button></div><div class="card p-8 text-center"><h3 class="text-2xl font-bold text-gold">Premium</h3><p class="text-4xl font-bold text-white mt-4">₺899<span class="text-base font-normal text-gray-400">/ay</span></p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-gold mr-2"></i>Tüm Pro</li><li><i class="fas fa-check text-gold mr-2"></i>Birebir Danışmanlık</li><li><i class="fas fa-check text-gold mr-2"></i>Özel FIRE Planı</li></ul><button class="mt-8 w-full py-2 border-2 border-gold text-gold rounded-lg font-semibold hover:bg-gold hover:text-[#0a0f2c] transition">Yükselt</button></div></div>`;
        }
        
        // ============================================
        // 6. RENDER ENGINE
        // ============================================
        
        function navigateTo(page) { currentPage = page; renderApp(); }
        
        function renderApp() {
            if (!currentUser) {
                document.getElementById('root').innerHTML = renderAuth();
                document.getElementById('loginForm')?.addEventListener('submit', (e) => { 
                    e.preventDefault(); 
                    if (handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)) renderApp(); 
                    else alert('Hatalı giriş! admin@finsage.com / admin123');
                });
                return;
            }
            
            let mainContent = `
                <div class="flex min-h-screen" style="background: linear-gradient(135deg, #0a0f2c 0%, #12173f 100%);">
                    ${renderSidebar()}
                    <main class="flex-1 ml-72 p-8 transition-all duration-300">
                        <div class="max-w-7xl mx-auto animate-fade-in">
                            <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                                <div>
                                    <h1 class="text-3xl font-bold text-gold">${currentPage === 'dashboard' ? 'Yönetim Paneli' : currentPage === 'investments' ? 'Yatırımlar' : currentPage === 'fire' ? 'FIRE Planlayıcı' : currentPage === 'digitalmarket' ? 'Dijital Market' : currentPage === 'advisory' ? 'Danışmanlık' : 'Ücretlendirme'}</h1>
                                    <p class="text-gray-400">Hoş geldiniz, ${currentUser.name}</p>
                                </div>
                            </div>
                            ${currentPage === 'dashboard' ? renderDashboard() : currentPage === 'investments' ? renderInvestments() : currentPage === 'fire' ? renderFire() : currentPage === 'digitalmarket' ? renderDigitalMarket() : currentPage === 'advisory' ? renderAdvisory() : renderPricing()}
                            ${renderFooter()}
                        </div>
                    </main>
                </div>
            `;
            document.getElementById('root').innerHTML = mainContent;
            
            if (currentPage === 'fire') {
                let slider = document.getElementById('fireSlider');
                let returnSlider = document.getElementById('returnSlider');
                if (slider) slider.addEventListener('input', (e) => { 
                    document.getElementById('fireSliderVal').innerText = `₺${parseInt(e.target.value).toLocaleString()}`; 
                    updateFirePrediction(); 
                });
                if (returnSlider) returnSlider.addEventListener('input', (e) => { 
                    document.getElementById('returnSliderVal').innerText = `%${e.target.value}`; 
                    updateFirePrediction(); 
                });
                function updateFirePrediction() { 
                    let years = (Math.random() * 12 + 12).toFixed(1);
                    document.getElementById('fireResult').innerHTML = `📊 Mevcut birikimle FIRE hedefine ${years} yılda (${new Date().getFullYear() + parseInt(years)} yılı) ulaşacaksınız.`; 
                }
            }
            
            if (currentPage === 'advisory') {
                document.getElementById('sendChat')?.addEventListener('click', () => {
                    let input = document.getElementById('chatInput');
                    let msg = input.value;
                    if (!msg.trim()) return;
                    let responses = [
                        "FIRE hedefinize ulaşmak için düzenli yatırım yapmalısınız.",
                        "Portföy çeşitlendirmesi riskinizi azaltır.",
                        "Acil durum fonunuzu 6-12 aylık gider olarak ayırmanızı öneririm.",
                        "Yatırım yaparken uzun vadeli düşünmek en doğrusudur."
                    ];
                    let response = responses[Math.floor(Math.random() * responses.length)];
                    let chatDiv = document.getElementById('chatMessages');
                    chatDiv.innerHTML += `<div class="mb-3 text-right"><div class="bg-gold rounded-lg p-3 inline-block"><p class="text-sm text-[#0a0f2c]">${msg}</p></div></div><div class="mb-3"><div class="bg-gold-light rounded-lg p-3 inline-block"><p class="text-sm text-gold">🤖 ${response}</p></div></div>`;
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                    input.value = '';
                });
            }
        }
        
        // Başlatma
        let savedUser = localStorage.getItem('finsage_user');
        if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
        renderApp();
    </script>
</body>
</html>
