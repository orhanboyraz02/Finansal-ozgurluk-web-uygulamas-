        function calculateFIRE() {
            let netIncome = financeData.monthlyIncome - financeData.monthlyExpense;
            financeData.netIncome = netIncome;
            financeData.annualExpense = financeData.monthlyExpense * 12;
            let netAssets = financeData.assets - financeData.liabilities;
            let adjustedNetIncome = netIncome * 12;
            let adjustedPassive = financeData.passiveIncome * 12;
            let adjustedExpense = financeData.monthlyExpense * 12;
            let realExpense = adjustedExpense * (1 + financeData.inflationRate / 100);
            let fireTarget = realExpense * 25;
            let currentSavings = netAssets + (adjustedNetIncome + adjustedPassive) * 0.7;
            let progress = (currentSavings / fireTarget * 100).toFixed(1);
            return { fireTarget, currentSavings, progress, realExpense, netIncome, annualExpense: financeData.annualExpense };
        }

        function renderSidebar() { return `<aside class="fixed left-0 top-0 h-full w-72 bg-[#0a0f2c] shadow-2xl z-20 overflow-y-auto border-r border-[#1e2556] p-6"><div class="flex items-center gap-3 mb-8"><div class="bg-gold w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-chart-line text-white"></i></div><h1 class="text-2xl font-bold text-gold">FinTech</h1></div><nav class="space-y-1">${[{ id: 'dashboard', icon: 'fa-chart-pie', label: 'Yönetim Paneli' },{ id: 'investments', icon: 'fa-chart-line', label: 'Yatırımlar' },{ id: 'fire', icon: 'fa-fire', label: 'FIRE Planlayıcı' },{ id: 'digitalmarket', icon: 'fa-store', label: 'Dijital Market' },{ id: 'advisory', icon: 'fa-users', label: 'Danışmanlık' },{ id: 'pricing', icon: 'fa-tag', label: 'Paketler' }].map(item => `<div onclick="navigateTo('${item.id}')" class="sidebar-link flex items-center gap-3 px-4 py-3 ${currentPage === item.id ? 'active-page' : 'text-gray-400'}"><i class="fas ${item.icon} w-5"></i><span>${item.label}</span></div>`).join('')}</nav><div class="absolute bottom-0 left-0 right-0 p-6 border-t border-[#1e2556]"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full bg-gold flex items-center justify-center"><span class="font-bold text-[#0a0f2c]">${currentUser?.name?.[0]}</span></div><div><p class="font-medium text-white">${currentUser?.name}</p><p class="text-xs text-gold">${currentUser?.paid ? 'Premium Üye' : (currentUser?.role === 'admin' ? 'Kurucu & CEO' : 'Basic Üye')}</p></div></div>${!isPremium() && currentUser?.role !== 'admin' ? `<button onclick="purchasePremium()" class="w-full mb-2 btn-gold py-2 text-sm rounded-lg"><i class="fab fa-whatsapp mr-1"></i>Premium'a Yükselt</button>` : ''}<button onclick="handleLogout()" class="w-full px-4 py-2 text-sm text-red-400 border border-red-400/30 rounded-xl hover:bg-red-400/10">Çıkış Yap</button></div></aside>`; }
        
        function renderDashboard() {
            let netWorth = calculateNetWorth();
            let health = getFinancialHealthScore();
            setTimeout(() => { let ctx = document.getElementById('trendChart')?.getContext('2d'); if(ctx) new Chart(ctx, { type: 'line', data: { labels: ['Oca', 'Şub', 'Mar', 'Nis', 'May'], datasets: [{ label: 'Portföy (₺)', data: [2850000, 2980000, 3120000, 3250000, 3420000], borderColor: '#f5b042', backgroundColor: 'rgba(245,176,66,0.1)', tension: 0.4, fill: true }] }, options: { responsive: true, maintainAspectRatio: true } }); }, 100);
            let content = `<div class="mb-6"><div class="bg-gold-light p-4 rounded-xl border-l-4 border-gold"><p class="text-gold text-sm">🤖 Yapay Zeka Destekli Finansal Yönetim</p><p class="text-white text-lg font-semibold">Hoş geldiniz, ${currentUser.name}</p></div></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"><div class="card p-6"><p class="text-gray-500">Net Varlık</p><h2 class="text-3xl font-bold text-gold">${formatMoney(netWorth)}</h2></div><div class="card p-6"><p class="text-gray-500">Finansal Sağlık</p><div class="flex justify-between items-center"><div><h2 class="text-4xl font-bold text-gold">${health.score}</h2><p class="text-emerald-500">${health.grade}</p></div><div class="w-16 h-16 rounded-full border-4 border-gold/50 flex items-center justify-center"><span class="text-xl font-bold text-gold">${health.score}</span></div></div></div><div class="card p-6"><p class="text-gray-500">Yapay Zeka Analizi</p><div class="bg-gold-light p-3 rounded-xl mt-2"><p class="text-gold text-sm">📊 Portföyünüz dengeli, düzenli yatırıma devam edin.</p></div></div></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Portföy Performansı</h3><canvas id="trendChart" height="200"></canvas></div><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Yönetim İşlemleri</h3><div class="space-y-3"><button onclick="openAddInvestmentModal()" class="w-full p-3 bg-gold/20 rounded-xl text-gold hover:bg-gold hover:text-[#0a0f2c] transition"><i class="fas fa-plus mr-2"></i>Yatırım Ekle</button><button onclick="openAddProductModal()" class="w-full p-3 bg-gold/20 rounded-xl text-gold hover:bg-gold hover:text-[#0a0f2c] transition"><i class="fas fa-plus mr-2"></i>Ürün Ekle</button></div></div></div>`;
            if (!isPremium() && currentUser?.role !== 'admin') { content = `<div class="relative">${content}${renderPremiumOverlay('Yönetim paneline ve tüm özelliklere erişmek için Premium paket satın alın.')}</div>`; }
            return content;
        }
        
        function renderInvestments() {
            let totalValue = investments.reduce((s,i)=>s+i.value,0);
            setTimeout(() => { let ctx = document.getElementById('invChart')?.getContext('2d'); if(ctx) new Chart(ctx, { type: 'pie', data: { labels: investments.map(i=>i.name), datasets: [{ data: investments.map(i=>i.value), backgroundColor: ['#f5b042','#e09d2c','#d48a1f','#c27818','#b0680d','#a05a10','#904c0a'] }] }, options: { responsive: true, maintainAspectRatio: true } }); }, 100);
            let content = `<div class="card p-6 mb-6"><div class="flex justify-between"><div><p class="text-gray-500">Toplam Portföy</p><h2 class="text-3xl font-bold text-gold">${formatMoney(totalValue)}</h2></div><button onclick="openAddInvestmentModal()" class="btn-gold px-4 py-2 rounded-lg"><i class="fas fa-plus mr-2"></i>Yatırım Ekle</button></div></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Varlıklar</h3>${investments.map(inv => `<div class="flex justify-between py-3 border-b"><div><p class="font-medium">${inv.name}</p><p class="text-xs text-gray-500">${inv.symbol}</p></div><div><p class="text-gold">${formatMoney(inv.value)}</p><p class="text-emerald-500 text-sm">+${inv.change}%</p></div><button onclick="deleteInvestment(${inv.id})" class="ml-4 text-red-400"><i class="fas fa-trash"></i></button></div>`).join('')}</div><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Dağılım</h3><canvas id="invChart" height="200"></canvas></div></div>`;
            if (!isPremium() && currentUser?.role !== 'admin') { content = `<div class="relative">${content}${renderPremiumOverlay('Yatırım detaylarına erişmek için Premium paket satın alın.')}</div>`; }
            return content;
        }
        
        function renderFire() {
            let fireData = calculateFIRE();
            let content = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div class="card p-6"><p class="text-gray-500">FIRE Hedefi (25x)</p><h2 class="text-2xl font-bold text-gold">${formatMoney(fireData.fireTarget)}</h2><div class="mt-3 bg-[#1e2556] rounded-full h-2"><div class="bg-gold h-2 rounded-full" style="width: ${Math.min(fireData.progress,100)}%"></div></div><p class="mt-2 text-gold">%${fireData.progress} tamamlandı</p></div><div class="card p-6"><p class="text-gray-500">Aylık Net Gelir (Gelir - Gider)</p><h2 class="text-2xl font-bold text-gold">${formatMoney(fireData.netIncome)}</h2></div></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6"><div class="card p-6"><p class="text-gray-500">Yıllık Gider</p><p class="text-2xl font-bold text-white">${formatMoney(fireData.annualExpense)}</p></div><div class="card p-6"><p class="text-gray-500">Borç</p><p class="text-2xl font-bold text-red-400">${formatMoney(financeData.liabilities)}</p></div><div class="card p-6"><p class="text-gray-500">Pasif Gelir / Ay</p><p class="text-2xl font-bold text-emerald-400">${formatMoney(financeData.passiveIncome)}</p></div></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div class="card p-6"><p class="text-gray-500">Enflasyon (Yıllık)</p><p class="text-2xl font-bold text-gold">%${financeData.inflationRate}</p></div><div class="card p-6"><p class="text-gray-500">Güncel FIRE İlerleme</p><p class="text-2xl font-bold text-gold">${fireData.progress}%</p></div></div>
            <div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">FIRE Hesaplama Parametreleri</h3><div class="grid grid-cols-2 gap-4"><div><label class="text-sm">Aylık Gelir</label><input type="number" id="incomeInput" value="${financeData.monthlyIncome}" class="bg-[#0f1338]"></div><div><label class="text-sm">Aylık Gider</label><input type="number" id="expenseInput" value="${financeData.monthlyExpense}" class="bg-[#0f1338]"></div><div><label class="text-sm">Yıllık Gider</label><input type="number" id="annualExpenseInput" value="${financeData.annualExpense}" class="bg-[#0f1338]" readonly disabled></div><div><label class="text-sm">Borç</label><input type="number" id="liabilitiesInput" value="${financeData.liabilities}" class="bg-[#0f1338]"></div><div><label class="text-sm">Pasif Gelir/ Ay</label><input type="number" id="passiveInput" value="${financeData.passiveIncome}" class="bg-[#0f1338]"></div><div><label class="text-sm">Enflasyon (%)</label><input type="number" id="inflationInput" value="${financeData.inflationRate}" class="bg-[#0f1338]"></div></div><button id="updateFireBtn" class="mt-4 btn-gold px-4 py-2 rounded-lg"><i class="fas fa-sync-alt mr-2"></i>Güncelle</button></div>`;
            if (!isPremium() && currentUser?.role !== 'admin') { content = `<div class="relative">${content}${renderPremiumOverlay('FIRE hesaplama detaylarına erişmek için Premium paket satın alın.')}</div>`; }
            return content;
        }
        
        function renderDigitalMarket() { return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">${marketplaceProducts.map(p => `<div class="card p-5 text-center"><div class="text-5xl mb-3">${p.image}</div><h3 class="font-bold text-gold text-base">${p.name}</h3><p class="text-gray-500 text-xs">${p.author}</p><p class="text-xl font-bold text-gold mt-2">${formatMoney(p.price)}</p><a href="${p.whatsappLink}" target="_blank" class="mt-3 w-full btn-gold py-2 rounded-lg inline-block text-sm"><i class="fab fa-whatsapp mr-1"></i>WhatsApp ile Satın Al</a>${currentUser?.role === 'admin' ? `<button onclick="deleteProduct(${p.id})" class="mt-2 text-red-400 text-xs"><i class="fas fa-trash mr-1"></i>Sil</button>` : ''}</div>`).join('')}</div>`; }
        
        function renderAdvisory() {
            return `<div class="card p-6 mb-6"><h3 class="font-semibold text-gold text-lg mb-4">Danışmanlık Hizmetleri (WhatsApp)</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${consultingServices.map(s => `<a href="https://wa.me/905418660202?text=${encodeURIComponent(s.whatsapp)}" target="_blank" class="p-4 bg-gold-light rounded-xl text-center hover:bg-gold/20 transition"><i class="fas ${s.icon} text-3xl text-gold mb-2"></i><p class="font-semibold text-white text-sm">${s.name}</p><p class="text-gold text-xs">${s.price}</p><p class="text-gray-500 text-xs mt-1">${s.desc}</p></a>`).join('')}</div></div>
            <div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">🤖 Yapay Zeka Finansal Asistan (Offline)</h3><div id="chatMessages" class="h-64 overflow-y-auto mb-4 p-3 bg-[#0f1338] rounded-xl"><div class="mb-3"><div class="bg-gold-light rounded-lg p-3 inline-block"><p class="text-sm text-gold">🤖 Merhaba! FinTech AI finansal asistanıyım. Yatırım, FIRE, borç yönetimi, tasarruf, enflasyon ve pasif gelir hakkında sorular sorabilirsiniz. (İnternet gerekmez)</p></div></div></div><div class="flex gap-2"><input type="text" id="chatInput" placeholder="Sorunuzu yazın..." class="flex-1 px-4 py-2 rounded-xl"><button id="sendChat" class="px-4 py-2 bg-gold text-[#0a0f2c] rounded-xl font-semibold"><i class="fas fa-robot mr-2"></i>AI'ya Sor</button></div></div>`;
        }
        
        function renderPricing() { return `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">${pricingPlans.map(p => `<div class="card p-8 text-center ${p.popular ? 'border-2 border-gold relative' : ''}">${p.popular ? '<div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-gold text-[#0a0f2c] px-3 py-1 rounded-full text-xs font-bold">Popüler</div>' : ''}<h3 class="text-2xl font-bold text-gold">${p.name}</h3><p class="text-4xl font-bold text-white mt-4">${p.price === 0 ? '₺0' : formatMoney(p.price)}<span class="text-base">${p.price !== 0 ? '/ay' : ''}</span></p><ul class="mt-6 space-y-2 text-left">${p.features.map(f => `<li class="text-sm text-gray-300"><i class="fas fa-check text-gold mr-2"></i>${f}</li>`).join('')}</ul><a href="https://wa.me/905418660202?text=${encodeURIComponent(p.whatsapp)}" target="_blank" class="mt-8 w-full py-2 border-2 border-gold text-gold rounded-lg inline-block hover:bg-gold hover:text-[#0a0f2c] transition text-center">WhatsApp ile Başla</a></div>`).join('')}</div>`; }
        
        function navigateTo(page) { currentPage = page; renderApp(); }
        
        async function renderApp() {
            if (!currentUser) { document.getElementById('root').innerHTML = renderAuth(); document.getElementById('loginForm')?.addEventListener('submit', (e) => { e.preventDefault(); if(handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)) renderApp(); else alert('Hatalı giriş!'); }); return; }
            let mainContent = `<div class="flex min-h-screen"><div>${renderSidebar()}</div><main class="flex-1 ml-72 p-8"><div class="max-w-7xl mx-auto animate-fade-in"><div class="text-center mb-4"><p class="text-gold text-sm tracking-wider">🤖 YAPAY ZEKA DESTEKLİ FİNANSAL YÖNETİM WEB UYGULAMASI | OFFLINE AI</p></div>${currentPage === 'dashboard' ? renderDashboard() : currentPage === 'investments' ? renderInvestments() : currentPage === 'fire' ? renderFire() : currentPage === 'digitalmarket' ? renderDigitalMarket() : currentPage === 'advisory' ? renderAdvisory() : renderPricing()}${renderFooter()}</div></main></div>`;
            document.getElementById('root').innerHTML = mainContent;
            if(currentPage === 'fire'){ 
                document.getElementById('updateFireBtn')?.addEventListener('click',()=>{ 
                    financeData.monthlyIncome=+document.getElementById('incomeInput').value; 
                    financeData.monthlyExpense=+document.getElementById('expenseInput').value; 
                    financeData.annualExpense = financeData.monthlyExpense * 12;
                    document.getElementById('annualExpenseInput').value = financeData.annualExpense;
                    financeData.liabilities=+document.getElementById('liabilitiesInput').value; 
                    financeData.passiveIncome=+document.getElementById('passiveInput').value; 
                    financeData.inflationRate=+document.getElementById('inflationInput').value; 
                    showToast('FIRE verileri güncellendi'); 
                    renderApp(); 
                }); 
            }
            if(currentPage === 'advisory'){
                document.getElementById('sendChat')?.addEventListener('click', () => { 
                    let input = document.getElementById('chatInput'); 
                    let msg = input.value.trim(); 
                    if(!msg) return; 
                    let chatDiv = document.getElementById('chatMessages'); 
                    chatDiv.innerHTML += `<div class="mb-3 text-right"><div class="bg-gold rounded-lg p-3 inline-block"><p class="text-sm text-[#0a0f2c]">${msg}</p></div></div><div class="mb-3"><div class="bg-gold-light rounded-lg p-3 inline-block"><p class="text-sm text-gold">🤖 <i class="fas fa-spinner fa-spin"></i> AI yanıtlıyor...</p></div></div>`; 
                    chatDiv.scrollTop = chatDiv.scrollHeight; 
                    setTimeout(() => { 
                        let reply = getOfflineAIResponse(msg); 
                        chatDiv.removeChild(chatDiv.lastChild); 
                        chatDiv.innerHTML += `<div class="mb-3"><div class="bg-gold-light rounded-lg p-3 inline-block"><p class="text-sm text-gold">🤖 ${reply}</p></div></div>`; 
                        chatDiv.scrollTop = chatDiv.scrollHeight; 
                    }, 500); 
                    input.value = ''; 
                });
            }
        }
        
        let saved = localStorage.getItem('fintech_user');
        if(saved) try{ currentUser = JSON.parse(saved); }catch(e){}
        renderApp();
    </script>
</body>
</html>
