        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 0 }).format(amount);
        }
        
        function calculateNetWorth() {
            let totalInvestments = investments.reduce((sum, inv) => sum + inv.value, 0);
            let totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            let totalExpenses = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            return totalInvestments + (totalIncome - totalExpenses);
        }
        
        function getFinancialHealthScore() {
            let monthlyIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            let monthlyExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            let savingsRate = monthlyIncome ? (monthlyIncome - monthlyExpense) / monthlyIncome : 0;
            let score = Math.min(100, Math.max(0, Math.floor(savingsRate * 100 + investments.length * 5)));
            return { score, grade: score > 80 ? 'Mükemmel' : score > 60 ? 'İyi' : score > 40 ? 'Orta' : 'Geliştirilmeli' };
        }
        
        function showToast(message) {
            let toast = document.createElement('div');

                if (ctx) new Chart(ctx, { type: 'doughnut', data: { labels: investments.map(i => i.name), datasets: [{ data: investments.map(i => i.value), backgroundColor: ['#f5b042', '#e09d2c', '#d48a1f', '#c27818'] }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#f5b042' } } } } });
            }, 100);
            return `<div class="card p-6 mb-6"><div class="flex justify-between items-start flex-wrap"><div><p class="text-gray-500">Toplam Yatırım Portföyü</p><h2 class="text-4xl font-bold text-gold">${formatMoney(totalValue)}</h2><p class="text-emerald-500 mt-2"><i class="fas fa-arrow-up"></i> +%18.2 Yıllık</p></div><button onclick="openAddInvestmentModal()" class="btn-gold px-4 py-2 rounded-lg"><i class="fas fa-plus mr-2"></i>Yatırım Ekle</button></div></div><div class="grid grid-cols-1 gap-4"><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Varlıklarım</h3>${investments.map(inv => `<div class="flex justify-between items-center py-3 border-b border-[#1e2556]"><div><p class="font-medium text-white">${inv.name}</p><p class="text-sm text-gray-500">${inv.symbol}</p></div><div class="text-right"><p class="font-medium text-gold">${formatMoney(inv.value)}</p><p class="text-sm text-emerald-500">+${inv.change}%</p></div><button onclick="deleteInvestment(${inv.id})" class="ml-4 text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button></div>`).join('')}</div><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Varlık Dağılımı</h3><canvas id="allocationChart" height="200"></canvas></div></div>`;
        }
        
        function renderFire() {
            let fireTarget = fireGoals[0].target;
            let currentPortfolio = calculateNetWorth();
            let progress = (currentPortfolio / fireTarget * 100).toFixed(1);
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div class="card p-6"><p class="text-gray-500">FIRE Hedefi (25x Kuralı)</p><h2 class="text-3xl font-bold text-gold">${formatMoney(fireTarget)}</h2><div class="mt-4 bg-[#1e2556] rounded-full h-2"><div class="bg-gold h-2 rounded-full" style="width: ${Math.min(progress, 100)}%"></div></div><p class="mt-2 text-sm text-gold">%${progress} Tamamlandı</p></div><div class="card p-6"><p class="text-gray-500">Yapay Zeka Önerisi</p><div class="bg-gold-light p-3 rounded-xl"><p class="text-gold text-sm"><i class="fas fa-robot mr-2"></i>Aylık yatırımınızı artırarak FIRE hedefine daha hızlı ulaşabilirsiniz.</p></div></div></div><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">FIRE Simülatörü</h3><div class="space-y-4"><div><label class="text-sm text-gray-300">Aylık Yatırım</label><input type="range" id="fireSlider" min="5000" max="50000" value="25000" class="w-full accent-gold"><span id="fireSliderVal" class="ml-3 font-mono text-gold">₺25,000</span></div><div><label class="text-sm text-gray-300">Beklenen Yıllık Getiri</label><input type="range" id="returnSlider" min="4" max="12" step="0.5" value="7" class="w-full accent-gold"><span id="returnSliderVal" class="ml-3 font-mono text-gold">%7</span></div><div class="bg-gold-light p-4 rounded-xl"><p id="fireResult" class="text-gold font-medium">📊 Mevcut birikimle FIRE hedefine 18.5 yılda ulaşacaksınız.</p></div></div></div>`;
        }
        
        function renderDigitalMarket() {
            return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">${marketplaceProducts.map(p => `<div class="card p-6 text-center"><div class="text-5xl mb-3">${p.image}</div><h3 class="font-bold text-gold text-lg">${p.name}</h3><p class="text-gray-500 text-sm">${p.type === 'course' ? '📺 Eğitim' : p.type === 'ebook' ? '📖 E-Kitap' : '🎯 Danışmanlık'} • ${p.rating}⭐ (${p.sales} satış)</p><p class="text-gray-400 text-xs mt-1">${p.author}</p><p class="text-2xl font-bold text-gold mt-3">${formatMoney(p.price)}</p><a href="${p.whatsappLink}" target="_blank" class="mt-4 w-full btn-gold py-2 rounded-lg inline-block"><i class="fab fa-whatsapp mr-2"></i>WhatsApp ile Satın Al</a>${currentUser?.role === 'admin' ? `<button onclick="deleteProduct(${p.id})" class="mt-2 w-full text-red-400 text-sm"><i class="fas fa-trash mr-1"></i>Sil</button>` : ''}</div>`).join('')}</div>`;
        }
        
        function renderAdvisory() {
            return `<div class="card p-6 mb-6"><h3 class="font-semibold text-gold text-lg mb-4">Danışmanlık Hizmetleri</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="p-4 bg-gold-light rounded-xl text-center"><i class="fas fa-user-tie text-3xl text-gold mb-2"></i><p class="font-semibold text-white">Bireysel Danışmanlık</p><p class="text-gold text-sm">499₺/saat</p><a href="https://wa.me/905418660202?text=Merhaba, bireysel danışmanlık hizmeti için randevu almak istiyorum." target="_blank" class="mt-2 inline-block text-gold text-sm">Randevu Al →</a></div><div class="p-4 bg-gold-light rounded-xl text-center"><i class="fas fa-chart-line text-3xl text-gold mb-2"></i><p class="font-semibold text-white">Portföy Yönetimi</p><p class="text-gold text-sm">3.999₺/ay</p><a href="https://wa.me/905418660202?text=Merhaba, portföy yönetimi hizmeti için başvurmak istiyorum." target="_blank" class="mt-2 inline-block text-gold text-sm">Başvur →</a></div><div class="p-4 bg-gold-light rounded-xl text-center"><i class="fas fa-fire text-3xl text-gold mb-2"></i><p class="font-semibold text-white">FIRE Planlaması</p><p class="text-gold text-sm">1.499₺</p><a href="https://wa.me/905418660202?text=Merhaba, FIRE planlaması hizmeti için detay almak istiyorum." target="_blank" class="mt-2 inline-block text-gold text-sm">Detaylar →</a></div></div></div><div class="card p-6"><h3 class="font-semibold text-gold text-lg mb-4">Yapay Zeka Finansal Asistan</h3><div id="chatMessages" class="h-64 overflow-y-auto mb-4 p-3 bg-[#0f1338] rounded-xl border border-[#1e2556]"><div class="mb-3"><div class="bg-gold-light rounded-lg p-3 inline-block"><p class="text-sm text-gold">🤖 Merhaba! Ben FinTech AI asistanınız. Size nasıl yardımcı olabilirim?</p></div></div></div><div class="flex gap-2"><input type="text" id="chatInput" placeholder="Sorunuzu yazın..." class="flex-1 px-4 py-2 rounded-xl focus:ring-2 focus:ring-gold"><button id="sendChat" class="px-4 py-2 bg-gold text-[#0a0f2c] rounded-xl font-semibold"><i class="fas fa-paper-plane"></i> Gönder</button></div></div>`;
        }
        
        function renderPricing() {
            return `<div class="grid grid-cols-1 md:grid-cols-3 gap-6"><div class="card p-8 text-center"><h3 class="text-2xl font-bold text-gold">Basic</h3><p class="text-4xl font-bold text-white mt-4">₺0<span class="text-base font-normal text-gray-400">/ay</span></p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-gold mr-2"></i>Yönetim Paneli</li><li><i class="fas fa-check text-gold mr-2"></i>Temel Takip</li><li><i class="fas fa-times text-gray-500 mr-2"></i>Yapay Zeka Analizi</li></ul><button class="mt-8 w-full py-2 border-2 border-gold text-gold rounded-lg font-semibold hover:bg-gold hover:text-[#0a0f2c] transition">Mevcut Plan</button></div><div class="card p-8 text-center border-2 border-gold relative"><div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-gold text-[#0a0f2c] px-3 py-1 rounded-full text-xs font-bold">Popüler</div><h3 class="text-2xl font-bold text-gold">Pro</h3><p class="text-4xl font-bold text-white mt-4">₺299<span class="text-base font-normal text-gray-400">/ay</span></p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-gold mr-2"></i>Tüm Basic</li><li><i class="fas fa-check text-gold mr-2"></i>Yatırım Analizi</li><li><i class="fas fa-check text-gold mr-2"></i>Yapay Zeka Önerileri</li></ul><button class="mt-8 w-full py-2 bg-gold text-[#0a0f2c] rounded-lg font-semibold hover:bg-amber-500 transition">Yükselt</button></div><div class="card p-8 text-center"><h3 class="text-2xl font-bold text-gold">Premium</h3><p class="text-4xl font-bold text-white mt-4">₺899<span class="text-base font-normal text-gray-400">/ay</span></p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-gold mr-2"></i>Tüm Pro</li><li><i class="fas fa-check text-gold mr-2"></i>Birebir Danışmanlık</li><li><i class="fas fa-check text-gold mr-2"></i>Özel FIRE Planı</li></ul><button class="mt-8 w-full py-2 border-2 border-gold text-gold rounded-lg font-semibold hover:bg-gold hover:text-[#0a0f2c] transition">Yükselt</button></div></div>`;
        }
        
        function navigateTo(page) { currentPage = page; renderApp(); }
        
        function renderApp() {
            if (!currentUser) {
                document.getElementById('root').innerHTML = renderAuth();
                document.getElementById('loginForm')?.addEventListener('submit', (e) => {
                    e.preventDefault();
                    if (handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)) renderApp();
                    else alert('Hatalı giriş! orhan@fintech.com / Orhan123!');
                });
                return;
            }
            
            let mainContent = `
                <div class="flex min-h-screen" style="background: linear-gradient(135deg, #0a0f2c 0%, #12173f 100%);">
                    ${renderSidebar()}
                    <main class="flex-1 ml-72 p-8 transition-all duration-300">
                        <div class="max-w-7xl mx-auto animate-fade-in">
                            <div class="text-center mb-4">
                                <p class="text-gold text-sm tracking-wider">YAPAY ZEKA DESTEKLİ FİNANSAL YÖNETİM WEB UYGULAMASI</p>
                            </div>
                            <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
                                <div>
                                    <h1 class="text-3xl font-bold text-gold">${currentPage === 'dashboard' ? 'Yönetim Paneli' : currentPage === 'investments' ? 'Yatırımlar' : currentPage === 'fire' ? 'FIRE Planlayıcı' : currentPage === 'digitalmarket' ? 'Dijital Market' : currentPage === 'advisory' ? 'Danışmanlık' : 'Ücretlendirme'}</h1>
                                    <p class="text-gray-400">Hoş geldiniz, ${currentUser.name}</p>
                                </div>
                            </div>
                            ${currentPage === 'dashboard' ? renderDashboard() : currentPage === 'investments' ? renderInvestments() : currentPage === 'fire' ? renderFire() : currentPage === 'digitalmarket' ? renderDigitalMarket() : currentPage === 'advisory' ? renderAdvisory() : renderPricing()}
                            ${renderFooter()}
                        </div>
                    </main>
                </div>
            `;
            document.getElementById('root').innerHTML = mainContent;
            
            if (currentPage === 'fire') {
                let slider = document.getElementById('fireSlider');
                let returnSlider = document.getElementById('returnSlider');
                if (slider) slider.addEventListener('input', (e) => { document.getElementById('fireSliderVal').innerText = `₺${parseInt(e.target.value).toLocaleString()}`; updatePrediction(); });
                if (returnSlider) returnSlider.addEventListener('input', (e) => { document.getElementById('returnSliderVal').innerText = `%${e.target.value}`; updatePrediction(); });
                const updatePrediction = () => { let years = (Math.random() * 12 + 12).toFixed(1); document.getElementById('fireResult').innerHTML = `📊 Mevcut birikimle FIRE hedefine ${years} yılda (${new Date().getFullYear() + parseInt(years)} yılı) ulaşacaksınız.`; };
            }
            
            if (currentPage === 'advisory') {
                document.getElementById('sendChat')?.addEventListener('click', () => {
                    let input = document.getElementById('chatInput');
                    let msg = input.value;
                    if (!msg.trim()) return;
                    let responses = ["FIRE hedefinize ulaşmak için düzenli yatırım yapmalısınız.", "Portföy çeşitlendirmesi riskinizi azaltır.", "Acil durum fonunuzu 6-12 aylık gider olarak ayırmanızı öneririm.", "Yatırım yaparken uzun vadeli düşünmek en doğrusudur."];
                    let response = responses[Math.floor(Math.random() * responses.length)];
                    let chatDiv = document.getElementById('chatMessages');
                    chatDiv.innerHTML += `<div class="mb-3 text-right"><div class="bg-gold rounded-lg p-3 inline-block"><p class="text-sm text-[#0a0f2c]">${msg}</p></div></div><div class="mb-3"><div class="bg-gold-light rounded-lg p-3 inline-block"><p class="text-sm text-gold">🤖 ${response}</p></div></div>`;
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                    input.value = '';
                });
            }
        }
        
        let savedUser = localStorage.getItem('fintech_user');
        if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
        renderApp();
    </script>
</body>
</html>
