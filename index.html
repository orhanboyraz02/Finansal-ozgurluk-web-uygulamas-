<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="FinSage - AI-Powered Financial Freedom Platform">
    <meta name="theme-color" content="#0f172a">
    <title>FinSage | Financial Independence Platform</title>
    
    <!-- Tailwind CSS + Fonts + Icons + Chart.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: white; border-radius: 1.5rem; transition: all 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15); }
        .sidebar-link { transition: all 0.2s; cursor: pointer; border-radius: 0.75rem; }
        .sidebar-link:hover { background: rgba(139,92,246,0.1); transform: translateX(4px); }
        .active-page { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s; }
        .btn-gradient:hover { transform: scale(1.02); opacity: 0.9; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass-effect { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .dark-mode { background: #0f172a; color: #f1f5f9; }
        .dark-mode .card { background: #1e293b; color: #f1f5f9; }
        .modal { transition: all 0.3s; }
    </style>
</head>
<body class="font-sans antialiased" id="appBody">
    <div id="root"></div>

    <script>
        // ============================================
        // 1. STATE MANAGEMENT & DATA MODELS
        // ============================================
        
        let currentUser = null;
        let currentPage = 'dashboard';
        let darkMode = localStorage.getItem('darkMode') === 'true';
        
        // Sample Data (Structured for Production)
        let users = [
            { id: 1, email: 'demo@finsage.com', password: 'demo123', name: 'Alex Morgan', tier: 'pro', avatar: 'A', joined: '2024-01-15' }
        ];
        
        let transactions = [
            { id: 1, type: 'income', desc: 'Salary - Tech Corp', amount: 48500, date: '2024-05-01', category: 'salary' },
            { id: 2, type: 'income', desc: 'Freelance Design', amount: 12500, date: '2024-04-28', category: 'freelance' },
            { id: 3, type: 'income', desc: 'Dividend Payment', amount: 2150, date: '2024-04-15', category: 'investments' },
            { id: 4, type: 'expense', desc: 'Mortgage/Rent', amount: 18500, date: '2024-04-25', category: 'housing' },
            { id: 5, type: 'expense', desc: 'Groceries', amount: 4200, date: '2024-04-22', category: 'food' },
            { id: 6, type: 'expense', desc: 'Transportation', amount: 2350, date: '2024-04-20', category: 'transport' },
            { id: 7, type: 'expense', desc: 'Subscriptions', amount: 850, date: '2024-04-18', category: 'subscriptions' },
            { id: 8, type: 'expense', desc: 'Dining Out', amount: 1800, date: '2024-04-16', category: 'lifestyle' }
        ];
        
        let investments = [
            { id: 1, name: 'S&P 500 ETF', symbol: 'SPY', type: 'stock', shares: 245, purchasePrice: 350, currentPrice: 412.5, value: 101062, change: 17.86 },
            { id: 2, name: 'Bitcoin', symbol: 'BTC', type: 'crypto', shares: 0.85, purchasePrice: 35000, currentPrice: 48500, value: 41225, change: 38.57 },
            { id: 3, name: 'Gold ETF', symbol: 'GLD', type: 'gold', shares: 50, purchasePrice: 420, currentPrice: 465, value: 23250, change: 10.71 },
            { id: 4, name: 'Turkish Index', symbol: 'XU100', type: 'stock', shares: 1200, purchasePrice: 85, currentPrice: 97.5, value: 117000, change: 14.71 }
        ];
        
        let fireGoals = [
            { id: 1, name: 'Financial Independence', target: 7500000, current: 1250000, deadline: '2035-12-31', priority: 'high' },
            { id: 2, name: 'Emergency Fund', target: 180000, current: 85000, deadline: '2024-12-31', priority: 'medium' }
        ];
        
        let marketplaceProducts = [
            { id: 1, name: 'FIRE Movement Masterclass', type: 'course', price: 299, sales: 234, rating: 4.8, image: '🎓' },
            { id: 2, name: 'Passive Income Blueprint', type: 'ebook', price: 49, sales: 1890, rating: 4.6, image: '📘' },
            { id: 3, name: '1-on-1 Financial Audit', type: 'consulting', price: 199, sales: 87, rating: 5.0, image: '🎯' }
        ];
        
        let advisors = [
            { id: 1, name: 'Sarah Chen', title: 'Senior Financial Planner', expertise: 'FIRE, Retirement', hourlyRate: 250, available: true },
            { id: 2, name: 'Michael Rodriguez', title: 'Investment Strategist', expertise: 'Stocks, Crypto', hourlyRate: 200, available: true }
        ];
        
        // AI Chatbot Knowledge Base
        let chatbotResponses = {
            'fire': 'Financial Independence Retire Early (FIRE) is a movement dedicated to extreme saving and investing to retire much earlier than traditional retirement age (typically 30s-50s).',
            'invest': 'Based on your profile, consider diversifying with index funds (60%), crypto (15%), gold (10%), and keep 15% in high-yield savings for opportunities.',
            'savings': 'With your current savings rate of 24%, you could reach FIRE in approximately 22 years. Increasing to 35% would reduce this to 14 years.',
            'default': 'I can help with investment strategies, FIRE planning, savings optimization, and retirement calculators. What specific topic interests you?'
        };
        
        // ============================================
        // 2. HELPER FUNCTIONS
        // ============================================
        
        function formatMoney(amount) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0 }).format(amount);
        }
        
        function calculateNetWorth() {
            let totalInvestments = investments.reduce((sum, inv) => sum + inv.value, 0);
            let totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            let totalExpenses = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            return totalInvestments + (totalIncome - totalExpenses);
        }
        
        function getFinancialHealthScore() {
            let monthlyIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            let monthlyExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            let savingsRate = (monthlyIncome - monthlyExpense) / monthlyIncome;
            let investmentScore = investments.length * 10;
            let debtScore = 25;
            let savingsScore = savingsRate * 100;
            let total = Math.min(100, Math.max(0, (savingsScore + investmentScore + debtScore) / 2.5));
            return { score: Math.floor(total), grade: total > 80 ? 'Excellent' : total > 60 ? 'Good' : total > 40 ? 'Fair' : 'Needs Attention' };
        }
        
        function getAIRecommendation() {
            let savingsRate = (transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0) - transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0)) / transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            if (savingsRate < 0.2) return "📊 Increase savings rate to 20-30% by automating transfers to your investment account first.";
            if (investments.length < 3) return "🎯 Diversify your portfolio. Consider adding international exposure and crypto for higher growth potential.";
            return "🚀 You're on track! Focus on tax-advantaged accounts and rebalance quarterly to maintain your target allocation.";
        }
        
        // ============================================
        // 3. AUTHENTICATION SYSTEM
        // ============================================
        
        function handleLogin(email, password) {
            let user = users.find(u => u.email === email && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('finsage_user', JSON.stringify({ id: user.id, name: user.name, email: user.email, tier: user.tier, avatar: user.avatar }));
                renderApp();
                return true;
            }
            return false;
        }
        
        function handleRegister(name, email, password) {
            if (users.find(u => u.email === email)) return false;
            let newUser = { id: users.length + 1, email, password, name, tier: 'basic', avatar: name[0], joined: new Date().toISOString().split('T')[0] };
            users.push(newUser);
            return handleLogin(email, password);
        }
        
        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('finsage_user');
            renderApp();
        }
        
        // ============================================
        // 4. UI COMPONENTS (Modular)
        // ============================================
        
        function renderAuth() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="max-w-md w-full animate-fade-in">
                        <div class="text-center mb-8">
                            <div class="gradient-bg w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                                <i class="fas fa-chart-line text-white text-3xl"></i>
                            </div>
                            <h1 class="text-4xl font-bold text-white mb-2">FinSage</h1>
                            <p class="text-white/80">AI-Powered Financial Freedom Platform</p>
                        </div>
                        <div class="bg-white rounded-2xl shadow-xl p-8">
                            <div class="flex gap-2 mb-6 border-b">
                                <button id="loginTab" class="flex-1 py-3 font-semibold text-indigo-600 border-b-2 border-indigo-600">Sign In</button>
                                <button id="registerTab" class="flex-1 py-3 font-semibold text-gray-500">Create Account</button>
                            </div>
                            <div id="loginForm">
                                <form id="loginFormElement">
                                    <input type="email" id="loginEmail" placeholder="Email address" class="w-full px-4 py-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" value="demo@finsage.com">
                                    <input type="password" id="loginPassword" placeholder="Password" class="w-full px-4 py-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500" value="demo123">
                                    <button type="submit" class="w-full btn-gradient text-white py-3 rounded-xl font-semibold">Sign In →</button>
                                </form>
                            </div>
                            <div id="registerForm" class="hidden">
                                <form id="registerFormElement">
                                    <input type="text" id="regName" placeholder="Full name" class="w-full px-4 py-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <input type="email" id="regEmail" placeholder="Email address" class="w-full px-4 py-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <input type="password" id="regPassword" placeholder="Password (min 6 characters)" class="w-full px-4 py-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <button type="submit" class="w-full btn-gradient text-white py-3 rounded-xl font-semibold">Create Free Account →</button>
                                </form>
                            </div>
                            <p class="text-center text-gray-500 text-sm mt-6">Demo: demo@finsage.com / demo123</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderSidebar() {
            return `
                <aside class="fixed left-0 top-0 h-full w-72 bg-white dark:bg-gray-900 shadow-xl z-20 transition-all duration-300 overflow-y-auto">
                    <div class="p-6">
                        <div class="flex items-center gap-3 mb-8">
                            <div class="gradient-bg w-10 h-10 rounded-xl flex items-center justify-center">
                                <i class="fas fa-chart-line text-white text-lg"></i>
                            </div>
                            <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">FinSage</h1>
                        </div>
                        <nav class="space-y-1">
                            ${[
                                { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
                                { id: 'investments', icon: 'fa-chart-line', label: 'Investments' },
                                { id: 'fire', icon: 'fa-fire', label: 'FIRE Planner' },
                                { id: 'advisory', icon: 'fa-users', label: 'Advisory' },
                                { id: 'marketplace', icon: 'fa-store', label: 'Marketplace' },
                                { id: 'pricing', icon: 'fa-tag', label: 'Pricing' }
                            ].map(item => `
                                <div onclick="navigateTo('${item.id}')" class="sidebar-link flex items-center gap-3 px-4 py-3 ${currentPage === item.id ? 'active-page' : 'text-gray-600 dark:text-gray-300'}">
                                    <i class="fas ${item.icon} w-5"></i>
                                    <span>${item.label}</span>
                                </div>
                            `).join('')}
                        </nav>
                        <div class="absolute bottom-0 left-0 right-0 p-6 border-t dark:border-gray-800">
                            <div class="flex items-center gap-3 mb-4">
                                <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center">
                                    <span class="font-bold text-indigo-600">${currentUser?.name?.[0] || 'U'}</span>
                                </div>
                                <div>
                                    <p class="font-medium">${currentUser?.name || 'User'}</p>
                                    <p class="text-xs text-gray-500 capitalize">${currentUser?.tier || 'basic'} Plan</p>
                                </div>
                            </div>
                            <button onclick="toggleDarkMode()" class="w-full mb-2 px-4 py-2 text-sm border rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800">
                                <i class="fas ${darkMode ? 'fa-sun' : 'fa-moon'} mr-2"></i>${darkMode ? 'Light' : 'Dark'} Mode
                            </button>
                            <button onclick="handleLogout()" class="w-full px-4 py-2 text-sm text-red-600 border border-red-200 rounded-xl hover:bg-red-50">
                                <i class="fas fa-sign-out-alt mr-2"></i>Sign Out
                            </button>
                        </div>
                    </div>
                </aside>
            `;
        }
        
        function renderDashboard() {
            let netWorth = calculateNetWorth();
            let health = getFinancialHealthScore();
            let monthlyIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            let monthlyExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            let savings = monthlyIncome - monthlyExpense;
            let savingsRate = ((savings / monthlyIncome) * 100).toFixed(1);
            
            setTimeout(() => {
                let ctx = document.getElementById('trendChart')?.getContext('2d');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'line',
                        data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'], datasets: [{ label: 'Portfolio Value', data: [125000, 128500, 132000, 138000, 142500], borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.1)', tension: 0.4, fill: true }] },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
                    });
                }
            }, 100);
            
            return `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="card p-6"><p class="text-gray-500 text-sm">Net Worth</p><h2 class="text-3xl font-bold mt-2">${formatMoney(netWorth)}</h2><p class="text-emerald-600 text-sm mt-1"><i class="fas fa-arrow-up"></i> +12.4% vs last month</p></div>
                    <div class="card p-6"><p class="text-gray-500 text-sm">Monthly Cash Flow</p><h2 class="text-3xl font-bold mt-2">${formatMoney(monthlyIncome)} <span class="text-base font-normal text-gray-400">/ ${formatMoney(monthlyExpense)}</span></h2><p class="text-indigo-600 text-sm mt-1">Savings: ${formatMoney(savings)} (${savingsRate}%)</p></div>
                    <div class="card p-6"><p class="text-gray-500 text-sm">Financial Health Score</p><div class="flex justify-between items-center mt-2"><div><h2 class="text-4xl font-bold text-indigo-600">${health.score}</h2><p class="text-emerald-600 text-sm">${health.grade}</p></div><div class="w-20 h-20 rounded-full border-4 border-indigo-200 flex items-center justify-center"><span class="text-2xl font-bold text-indigo-600">${health.score}</span></div></div></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                    <div class="card p-6"><h3 class="font-semibold text-lg mb-4">Portfolio Performance</h3><canvas id="trendChart" height="200"></canvas></div>
                    <div class="card p-6"><h3 class="font-semibold text-lg mb-4">AI Insight</h3><div class="bg-indigo-50 dark:bg-indigo-950/30 p-4 rounded-xl mb-4"><p class="text-indigo-800 dark:text-indigo-300"><i class="fas fa-robot mr-2"></i>${getAIRecommendation()}</p></div><h3 class="font-semibold text-lg mb-3 mt-4">Recent Transactions</h3>${transactions.slice(0, 4).map(t => `<div class="flex justify-between py-2 border-b"><span><i class="fas ${t.type === 'income' ? 'fa-arrow-up text-emerald-500' : 'fa-arrow-down text-red-500'} mr-2"></i>${t.desc}</span><span class="${t.type === 'income' ? 'text-emerald-500' : 'text-red-500'}">${t.type === 'income' ? '+' : '-'}${formatMoney(t.amount)}</span></div>`).join('')}</div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6"><div class="card p-6 text-center"><i class="fas fa-chart-simple text-3xl text-indigo-600 mb-3"></i><h3 class="font-semibold">Investment ROI</h3><p class="text-2xl font-bold text-indigo-600">+24.7%</p></div><div class="card p-6 text-center"><i class="fas fa-calendar-check text-3xl text-indigo-600 mb-3"></i><h3 class="font-semibold">FIRE Progress</h3><p class="text-2xl font-bold text-indigo-600">16.7%</p></div><div class="card p-6 text-center"><i class="fas fa-shield-alt text-3xl text-indigo-600 mb-3"></i><h3 class="font-semibold">Risk Score</h3><p class="text-2xl font-bold text-emerald-600">Low-Medium</p></div></div>
            `;
        }
        
        function renderInvestments() {
            let totalValue = investments.reduce((s, i) => s + i.value, 0);
            setTimeout(() => {
                let ctx = document.getElementById('allocationChart')?.getContext('2d');
                if (ctx) new Chart(ctx, { type: 'doughnut', data: { labels: investments.map(i => i.name), datasets: [{ data: investments.map(i => i.value), backgroundColor: ['#667eea', '#f59e0b', '#10b981', '#ef4444'] }] }, options: { responsive: true, maintainAspectRatio: true } });
            }, 100);
            return `<div class="card p-6 mb-6"><div class="flex justify-between items-start"><div><p class="text-gray-500">Total Portfolio Value</p><h2 class="text-4xl font-bold">${formatMoney(totalValue)}</h2><p class="text-emerald-600 mt-2"><i class="fas fa-arrow-up"></i> +18.2% YTD</p></div><div class="bg-emerald-50 px-4 py-2 rounded-full"><span class="text-emerald-600 font-semibold">Low Risk</span></div></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="card p-6"><h3 class="font-semibold text-lg mb-4">Holdings</h3>${investments.map(inv => `<div class="flex justify-between items-center py-3 border-b"><div><p class="font-medium">${inv.name}</p><p class="text-sm text-gray-500">${inv.shares} shares @ ${formatMoney(inv.purchasePrice)}</p></div><div class="text-right"><p class="font-medium">${formatMoney(inv.value)}</p><p class="text-sm text-emerald-600">+${inv.change}%</p></div></div>`).join('')}</div><div class="card p-6"><h3 class="font-semibold text-lg mb-4">Asset Allocation</h3><canvas id="allocationChart" height="250"></canvas><div class="mt-4 p-3 bg-indigo-50 rounded-xl"><p class="text-sm text-indigo-800"><i class="fas fa-robot mr-1"></i> AI Suggestion: Rebalance to 70% stocks, 20% bonds, 10% alternatives</p></div></div></div>`;
        }
        
        function renderFire() {
            let monthlyExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            let fireTarget = monthlyExpense * 12 * 25;
            let currentPortfolio = calculateNetWorth();
            let progress = (currentPortfolio / fireTarget * 100).toFixed(1);
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div class="card p-6"><p class="text-gray-500">FIRE Target (25x Rule)</p><h2 class="text-3xl font-bold">${formatMoney(fireTarget)}</h2><div class="mt-4 bg-gray-200 rounded-full h-2"><div class="bg-indigo-600 h-2 rounded-full" style="width: ${Math.min(progress, 100)}%"></div></div><p class="mt-2 text-sm">${progress}% Complete (${formatMoney(currentPortfolio)} / ${formatMoney(fireTarget)})</p></div><div class="card p-6"><p class="text-gray-500">Monthly Passive Income Goal</p><h2 class="text-3xl font-bold">${formatMoney(monthlyExpense)}/month</h2><p class="text-emerald-600 mt-2">Current Passive: ${formatMoney(monthlyExpense * 0.18)} (18%)</p></div></div><div class="card p-6"><h3 class="font-semibold text-lg mb-4">Retirement Simulator</h3><div class="space-y-4"><div><label class="text-sm">Monthly Investment</label><input type="range" id="fireSlider" min="1000" max="30000" value="15000" class="w-full"><span id="fireSliderVal" class="ml-3 font-mono text-indigo-600">₺15,000</span></div><div><label class="text-sm">Expected Annual Return</label><input type="range" id="returnSlider" min="4" max="12" step="0.5" value="7" class="w-full"><span id="returnSliderVal" class="ml-3 font-mono text-indigo-600">7%</span></div><div class="bg-indigo-50 p-4 rounded-xl"><p id="fireResult" class="text-indigo-800 font-medium">📊 With current savings, you'll reach FIRE in 18.5 years (age 49).</p></div></div></div>`;
        }
        
        function renderAdvisory() {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div class="card p-6"><h3 class="font-semibold text-lg mb-4">Book a Consultation</h3>${advisors.map(a => `<div class="flex justify-between items-center py-3 border-b"><div><p class="font-medium">${a.name}</p><p class="text-sm text-gray-500">${a.title} • ${a.expertise}</p><p class="text-indigo-600 text-sm mt-1">${formatMoney(a.hourlyRate)}/hour</p></div><button class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">Book</button></div>`).join('')}</div><div class="card p-6"><h3 class="font-semibold text-lg mb-4">AI Financial Advisor</h3><div id="chatMessages" class="h-64 overflow-y-auto mb-4 p-3 bg-gray-50 rounded-xl"><div class="mb-3"><div class="bg-indigo-100 rounded-lg p-3 inline-block"><p class="text-sm">👋 Hello! I'm your AI financial advisor. Ask me about FIRE, investments, or savings strategies!</p></div></div></div><div class="flex gap-2"><input type="text" id="chatInput" placeholder="Ask me anything..." class="flex-1 px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"><button id="sendChat" class="px-4 py-2 bg-indigo-600 text-white rounded-xl"><i class="fas fa-paper-plane"></i></button></div></div></div>`;
        }
        
        function renderMarketplace() {
            return `<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">${marketplaceProducts.map(p => `<div class="card p-6 text-center"><div class="text-5xl mb-3">${p.image}</div><h3 class="font-bold text-lg">${p.name}</h3><p class="text-gray-500 text-sm">${p.type.charAt(0).toUpperCase() + p.type.slice(1)} • ${p.rating}⭐ (${p.sales} sold)</p><p class="text-2xl font-bold text-indigo-600 mt-3">${formatMoney(p.price)}</p><button class="mt-4 w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Purchase</button></div>`).join('')}</div><div class="card p-6"><h3 class="font-semibold text-lg mb-4">Affiliate Financial Services</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="p-4 border rounded-xl text-center"><i class="fas fa-credit-card text-2xl text-indigo-600 mb-2"></i><p class="font-medium">High-Yield Savings</p><p class="text-sm text-gray-500">4.5% APY</p><button class="mt-2 text-indigo-600 text-sm">Learn More →</button></div><div class="p-4 border rounded-xl text-center"><i class="fas fa-chart-line text-2xl text-indigo-600 mb-2"></i><p class="font-medium">Robo-Advisor</p><p class="text-sm text-gray-500">0.25% fee</p><button class="mt-2 text-indigo-600 text-sm">Learn More →</button></div><div class="p-4 border rounded-xl text-center"><i class="fas fa-file-invoice text-2xl text-indigo-600 mb-2"></i><p class="font-medium">Tax Services</p><p class="text-sm text-gray-500">Starting $49</p><button class="mt-2 text-indigo-600 text-sm">Learn More →</button></div></div></div>`;
        }
        
        function renderPricing() {
            return `<div class="grid grid-cols-1 md:grid-cols-3 gap-6"><div class="card p-8 text-center"><h3 class="text-2xl font-bold">Basic</h3><p class="text-4xl font-bold mt-4">Free</p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-emerald-500 mr-2"></i>Core dashboard & tracking</li><li><i class="fas fa-check text-emerald-500 mr-2"></i>1 investment portfolio</li><li><i class="fas fa-times text-gray-400 mr-2"></i>AI insights</li><li><i class="fas fa-times text-gray-400 mr-2"></i>Advisory access</li></ul><button class="mt-8 w-full py-2 border-2 border-indigo-600 text-indigo-600 rounded-lg font-semibold">Current Plan</button></div><div class="card p-8 text-center border-2 border-indigo-600 relative"><div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white px-3 py-1 rounded-full text-xs">Popular</div><h3 class="text-2xl font-bold">Pro</h3><p class="text-4xl font-bold mt-4">$9.99<span class="text-base font-normal">/mo</span></p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-emerald-500 mr-2"></i>Everything in Basic</li><li><i class="fas fa-check text-emerald-500 mr-2"></i>Unlimited portfolios</li><li><i class="fas fa-check text-emerald-500 mr-2"></i>AI-powered insights</li><li><i class="fas fa-check text-emerald-500 mr-2"></i>Chatbot support</li></ul><button class="mt-8 w-full py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700">Upgrade Now</button></div><div class="card p-8 text-center"><h3 class="text-2xl font-bold">Premium</h3><p class="text-4xl font-bold mt-4">$29.99<span class="text-base font-normal">/mo</span></p><ul class="mt-6 space-y-3 text-left"><li><i class="fas fa-check text-emerald-500 mr-2"></i>Everything in Pro</li><li><i class="fas fa-check text-emerald-500 mr-2"></i>1-on-1 advisor sessions</li><li><i class="fas fa-check text-emerald-500 mr-2"></i>Personalized FIRE plan</li><li><i class="fas fa-check text-emerald-500 mr-2"></i>Priority support</li></ul><button class="mt-8 w-full py-2 border-2 border-indigo-600 text-indigo-600 rounded-lg font-semibold">Upgrade</button></div></div>`;
        }
        
        // ============================================
        // 5. RENDER ENGINE
        // ============================================
        
        function navigateTo(page) { currentPage = page; renderApp(); }
        function toggleDarkMode() { darkMode = !darkMode; localStorage.setItem('darkMode', darkMode); renderApp(); }
        
        function renderApp() {
            if (!currentUser) {
                document.getElementById('root').innerHTML = renderAuth();
                document.getElementById('loginTab')?.addEventListener('click', () => { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginTab').classList.add('border-indigo-600', 'text-indigo-600'); document.getElementById('registerTab').classList.remove('border-indigo-600', 'text-indigo-600'); });
                document.getElementById('registerTab')?.addEventListener('click', () => { document.getElementById('registerForm').classList.remove('hidden'); document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerTab').classList.add('border-indigo-600', 'text-indigo-600'); document.getElementById('loginTab').classList.remove('border-indigo-600', 'text-indigo-600'); });
                document.getElementById('loginFormElement')?.addEventListener('submit', (e) => { e.preventDefault(); if (handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)) renderApp(); else alert('Invalid credentials'); });
                document.getElementById('registerFormElement')?.addEventListener('submit', (e) => { e.preventDefault(); if (handleRegister(document.getElementById('regName').value, document.getElementById('regEmail').value, document.getElementById('regPassword').value)) renderApp(); else alert('Registration failed or email exists'); });
                return;
            }
            
            let mainContent = `
                <div class="flex min-h-screen bg-gray-50 dark:bg-gray-900">
                    ${renderSidebar()}
                    <main class="flex-1 ml-72 p-8 transition-all duration-300">
                        <div class="max-w-7xl mx-auto animate-fade-in">
                            <h1 class="text-3xl font-bold mb-2">${currentPage.charAt(0).toUpperCase() + currentPage.slice(1)}</h1>
                            <p class="text-gray-500 mb-6">Welcome back, ${currentUser.name}</p>
                            ${currentPage === 'dashboard' ? renderDashboard() : currentPage === 'investments' ? renderInvestments() : currentPage === 'fire' ? renderFire() : currentPage === 'advisory' ? renderAdvisory() : currentPage === 'marketplace' ? renderMarketplace() : renderPricing()}
                        </div>
                    </main>
                </div>
            `;
            document.getElementById('root').innerHTML = mainContent;
            
            if (currentPage === 'fire') {
                let slider = document.getElementById('fireSlider');
                let returnSlider = document.getElementById('returnSlider');
                if (slider) slider.addEventListener('input', (e) => { document.getElementById('fireSliderVal').innerText = `₺${parseInt(e.target.value).toLocaleString()}`; updateFirePrediction(); });
                if (returnSlider) returnSlider.addEventListener('input', (e) => { document.getElementById('returnSliderVal').innerText = `${e.target.value}%`; updateFirePrediction(); });
                function updateFirePrediction() { document.getElementById('fireResult').innerHTML = `📊 With current savings, you'll reach FIRE in ${(Math.random() * 10 + 12).toFixed(1)} years (age ${(new Date().getFullYear() - 1990 + 12).toFixed(0)}).`; }
            }
            
            if (currentPage === 'advisory') {
                document.getElementById('sendChat')?.addEventListener('click', () => {
                    let input = document.getElementById('chatInput');
                    let msg = input.value.toLowerCase();
                    let response = chatbotResponses[msg.includes('fire') ? 'fire' : msg.includes('invest') ? 'invest' : msg.includes('saving') ? 'savings' : 'default'];
                    let chatDiv = document.getElementById('chatMessages');
                    chatDiv.innerHTML += `<div class="mb-3 text-right"><div class="bg-indigo-100 rounded-lg p-3 inline-block"><p class="text-sm">${msg}</p></div></div><div class="mb-3"><div class="bg-gray-200 rounded-lg p-3 inline-block"><p class="text-sm">🤖 ${response}</p></div></div>`;
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                    input.value = '';
                });
            }
        }
        
        // Initialize
        let savedUser = localStorage.getItem('finsage_user');
        if (savedUser) { try { currentUser = JSON.parse(savedUser); } catch(e) {} }
        renderApp();
    </script>
</body>
</html>
